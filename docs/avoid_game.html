<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1220" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <title>피하기 게임</title>
  <style>

    :root {
      --bg0: #070912;
      --bg1: #0f1220;
      --bg2: #141a2b;
      --surface: rgba(255, 255, 255, 0.06);
      --surface2: rgba(255, 255, 255, 0.09);
      --stroke: rgba(255, 255, 255, 0.12);
      --stroke2: rgba(255, 255, 255, 0.18);
      --text: #e9ecff;
      --muted: rgba(233, 236, 255, 0.72);
      --muted2: rgba(233, 236, 255, 0.48);
      --primary: #5b78ff;
      --primary2: #4aa2ff;
      --danger: #ff5160;
      --gold0: #ffd36b;
      --gold1: #ffefb3;
    }

    :root[data-theme="light"] {
      --bg0: #f4f6ff;
      --bg1: #eef2ff;
      --bg2: #ffffff;
      --surface: rgba(17, 24, 39, 0.05);
      --surface2: rgba(17, 24, 39, 0.07);
      --stroke: rgba(17, 24, 39, 0.12);
      --stroke2: rgba(17, 24, 39, 0.18);
      --text: #0b1220;
      --muted: rgba(11, 18, 32, 0.70);
      --muted2: rgba(11, 18, 32, 0.46);
      --primary: #3f5bff;
      --primary2: #2f8cff;
      --danger: #e11d48;
      --gold0: #e2b44f;
      --gold1: #fff0c2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-rounded, system-ui, -apple-system, "SF Pro Rounded", "SF Pro Display", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 900px at 20% 18%, rgba(91, 120, 255, 0.18), transparent 56%),
        radial-gradient(860px 860px at 86% 80%, rgba(74, 162, 255, 0.12), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 34%, #0a0e18);
      display: grid;
      place-items: center;
      padding: 16px;
    }

    @supports (height: 100svh) {
      body { min-height: 100svh; }
      .app { height: min(92svh, 860px); }
    }

    @supports (height: 100dvh) {
      /* Prefer stable svh above; dvh is here for browsers that only support dvh. */
      .app { height: min(92dvh, 860px); }
    }

    .app {
      width: min(92vw, 420px);
      height: min(var(--appVhPx, 92vh), 860px);
      background:
        radial-gradient(900px 900px at 50% -10%, rgba(255, 255, 255, 0.06), transparent 55%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      border: 1px solid var(--stroke);
      border-radius: 28px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.55);
      overflow: hidden;
      position: relative;
      padding: 18px 18px calc(18px + 104px + env(safe-area-inset-bottom));
      backdrop-filter: blur(10px);
    }

    .view { display: none; height: 100%; position: relative; z-index: 1; }
    .view.active { display: flex; flex-direction: column; gap: 14px; }

    #gameView.view.active { gap: 8px; }

    #gameView { min-height: 0; }

    .hud {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 46px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--stroke);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .pill strong { font-weight: 900; letter-spacing: 0.2px; }

    .pill svg { width: 18px; height: 18px; opacity: 0.9; }

    .center {
      flex: 1;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 6px 8px;
    }

    .mascot-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }
    .mascot {
      width: 108px;
      height: 108px;
      border-radius: 28px;
      background: transparent;
      border: 0;
      display: grid;
      place-items: center;
      position: relative;
      box-shadow: none;
      --skin-body: #A8E6CF;
      --skin-eye: #142025;
    }

    .mascot-avatar {
      width: 62px;
      height: 62px;
      border-radius: 20px;
      background: var(--skin-body);
      border: 1px solid rgba(0, 0, 0, 0.22);
      position: relative;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.24);
    }

    .mascot-avatar::before,
    .mascot-avatar::after {
      content: "";
      position: absolute;
      top: 24px;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--skin-eye);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.20);
      opacity: 0.95;
    }

    .mascot-avatar::before { left: 18px; }
    .mascot-avatar::after { right: 18px; }

    .brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
      user-select: none;
    }

    .brand-mark {
      width: 22px;
      height: 22px;
      transform: rotate(45deg);
      border-radius: 6px;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 10px 26px rgba(91, 120, 255, 0.20);
    }

            .brand-name {
      font-size: 46px;
      font-weight: 950;
      letter-spacing: -0.9px;
      line-height: 1.0;
    }


    .brand-sub {
      font-size: 20px;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: -0.2px;
      margin-top: 2px;
    }

    .subline {
      margin-top: 12px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: -0.1px;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted2);
      font-weight: 750;
      max-width: 320px;
      line-height: 1.3;
    }

        .cta {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 18px 18px;
      font-size: 22px;
      font-weight: 950;
      letter-spacing: 0.1px;
      color: rgba(255,255,255,0.96);
      background: linear-gradient(90deg, #4f6bff, #5b86ff);
      box-shadow: 0 22px 60px rgba(91, 120, 255, 0.32);
      cursor: pointer;
    
      margin-bottom: 18px;
    }

    .cta:active { transform: translateY(1px); }

    .panel {
      background: var(--surface);
      border: 1px solid var(--stroke);
      border-radius: 18px;
      padding: 14px;
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      font-weight: 950;
      letter-spacing: -0.2px;
    }

    .muted { color: var(--muted); }

    .btn {
      width: 100%;
      border: 1px solid var(--stroke);
      border-radius: 14px;
      padding: 12px 12px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 14px;
      font-weight: 850;
      cursor: pointer;
    }

    .seg {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .seg-btn {
      border: 1px solid var(--stroke);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 10px;
      font-weight: 950;
      cursor: pointer;
    }

    :root[data-theme="light"] .seg-btn {
      background: rgba(17, 24, 39, 0.04);
    }

    .seg-btn.active {
      background: rgba(91, 120, 255, 0.18);
      border-color: rgba(91, 120, 255, 0.35);
    }

    .btn.alt {
      background: rgba(91, 120, 255, 0.14);
      border-color: rgba(91, 120, 255, 0.22);
    }

    .btn:active { transform: translateY(1px); }

    .mini-btn {
      margin-top: 10px;
      width: 100%;
      border: 1px solid var(--stroke);
      border-radius: 14px;
      padding: 10px 10px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 13px;
      font-weight: 850;
      cursor: pointer;
    }

    .mini-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .notice {
      text-align: center;
      font-weight: 950;
      color: rgba(15, 18, 32, 0.96);
      border-radius: 999px;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
      height: 0;
      padding: 0;
      overflow: hidden;
    }

    .notice.show {
      height: auto;
      padding: 10px 14px;
      opacity: 1;
      transform: translateY(0);
      background: linear-gradient(90deg, rgba(255, 211, 107, 0.95), rgba(255, 239, 179, 0.92));
      border: 1px solid rgba(0, 0, 0, 0.20);
      min-height: 40px;
    }
    .game-hud {
      width: 100%;
      max-width: 372px;
      margin: 0 auto;
      padding: 0 6px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    @media (max-width: 380px) {
      .game-hud {
        max-width: 100%;
        padding: 0 6px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    .hud-chip {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--stroke);
      font-weight: 900;
      color: var(--text);
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .hud-chip span {
      color: var(--muted);
      font-weight: 850;
      font-size: 13px;
      letter-spacing: 0.1px;
    }

    .hud-chip strong {
      display: inline-block;
      min-width: 2ch;
      font-size: 17px;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
      background: linear-gradient(180deg, #0d1220 0%, #121b30 100%);
      border: 1px solid rgba(255, 255, 255, 0.10);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    .game-stage {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
    }

        .game-stage canvas {
      width: 100%;
      height: auto;
      max-height: 100%;
      aspect-ratio: 3 / 4;
    }

    .game-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 380px) {
      .game-actions { grid-template-columns: 1fr; }
    }

    .skin-view-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .skin-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .skin-pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }

    .page-btn {
      min-width: 38px;
      border: 1px solid var(--stroke);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(233, 236, 255, 0.92);
      padding: 8px 10px;
      font-weight: 900;
      cursor: pointer;
    }

    .page-btn.active {
      background: rgba(91, 120, 255, 0.20);
      border-color: rgba(91, 120, 255, 0.32);
    }

    .skin-card {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      text-align: left;
    }

    .skin-card.selected {
      border-color: rgba(91, 120, 255, 0.50);
      box-shadow: inset 0 0 0 1px rgba(91, 120, 255, 0.35);
    }

    .skin-card.legendary {
      position: relative;
      border: 2px solid transparent;
      background:
        linear-gradient(rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.06)) padding-box,
        linear-gradient(90deg, var(--gold0), #ffd700, var(--gold1), var(--gold0)) border-box;
      background-size: auto, 260% 100%;
      animation: legendaryShimmer 2.4s linear infinite;
    }

    .skin-card.legendary::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 20px;
      background: linear-gradient(90deg, rgba(255, 211, 107, 0.14), rgba(255, 215, 0, 0.16), rgba(255, 239, 179, 0.12), rgba(255, 211, 107, 0.14));
      filter: blur(14px);
      opacity: 0.9;
      z-index: -1;
    }

    @keyframes legendaryShimmer {
      0% { background-position: 0 0, 0 0; }
      100% { background-position: 0 0, 260% 0; }
    }

    .rarity-tag {
      display: inline-block;
      margin-left: 8px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 950;
      border: 1px solid rgba(0, 0, 0, 0.22);
      vertical-align: middle;
    }

    .rarity-tag.rarity-L {
      color: #2b1b00;
      background: linear-gradient(90deg, var(--gold0), #ffd700, var(--gold1));
    }

    .legendary-pop {
      color: rgba(255, 239, 179, 0.98);
      text-shadow: 0 0 18px rgba(255, 215, 0, 0.55);
      animation: legendaryPop 900ms ease;
    }

    @keyframes legendaryPop {
      0% { transform: translateY(2px) scale(0.98); filter: blur(0.3px); }
      35% { transform: translateY(0) scale(1.03); filter: blur(0); }
      100% { transform: translateY(0) scale(1); }
    }

    .skin-chip {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 6px;
      border: 1px solid rgba(0, 0, 0, 0.22);
      vertical-align: middle;
      margin-right: 6px;
    }
    .tabbar {
      z-index: 9999;
      pointer-events: auto;
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(12px + env(safe-area-inset-bottom));
      max-width: 420px;
      margin: 0 auto;
      padding: 12px 18px;
      border-radius: 26px;
      background: rgba(15, 18, 32, 0.86);
      border: 1px solid var(--stroke);
      box-shadow: 0 24px 70px rgba(0,0,0,0.55);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .tabbar button {
      touch-action: manipulation;
      position: relative;
      z-index: 1;
      border: 0;
      background: transparent;
      color: rgba(233, 236, 255, 0.70);
      font-weight: 900;
      padding: 10px 8px;
      border-radius: 16px;
      cursor: pointer;
      display: grid;
      place-items: center;
      gap: 6px;
    }

    .tabbar svg { width: 22px; height: 22px; opacity: 0.85; }

    .tab-indicator {
      position: absolute;
      top: 10px;
      bottom: 10px;
      left: 0;
      width: 60px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.10);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
      transition: transform 220ms ease, width 220ms ease;
      will-change: transform, width;
      pointer-events: none;
    }
    .tabbar button.active {
      color: rgba(233, 236, 255, 0.96);
    }

    .tabbar button.active svg { opacity: 1; }

    .app.in-game { padding-bottom: 18px; }
    .in-game .tabbar { display: none; }

    @media (max-height: 700px) {
      .brand-name { font-size: 34px; }
      .brand-sub { font-size: 18px; }
      .app { padding-top: 14px; padding-bottom: calc(14px + 76px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
    <main class="app">
    <section id="lobbyView" class="view active">
      <div class="hud">
        <div class="pill" title="퍼즐 조각">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 2c2.6 3 3.4 5.2 3.4 7 0 1.1-.3 2.1-.9 2.9 1.5.2 2.7 1.6 2.7 3.2A5.2 5.2 0 0 1 12 22a5.2 5.2 0 0 1-5.2-5.9c.2-2.5 2.1-4.2 3.8-5.5C11.1 9.2 12 6.8 12 2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" opacity="0.9"/></svg>
          <strong><span id="lobbyPieces">0</span></strong>
        </div>
      </div>

      <div class="center">
        <div>
          <div class="mascot-wrap">
  <div id="lobbyMascot" class="mascot" aria-hidden="true">
    <div class="mascot-avatar"></div>
  </div>
</div>

<div class="brand">
            <span class="brand-mark" aria-hidden="true"></span>
            <span class="brand-name">AVOID</span>
          </div>
          <div class="brand-sub">Level <span id="lobbyLevel">1</span></div>
          <div class="subline">Best <span id="lobbyBest">0</span></div>
          <div class="hint">현재 스킨: <strong><span id="lobbySkinName">기본</span></strong></div>
          <div class="hint" id="nextSkinHint">다음 스킨 해금까지 0개</div>
        </div>
      </div>

      <button class="cta" id="startBtn">Play</button>
    </section>

    <section id="skinView" class="view">
      <div class="hud">
        <div class="pill" title="퍼즐 조각">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 2c2.6 3 3.4 5.2 3.4 7 0 1.1-.3 2.1-.9 2.9 1.5.2 2.7 1.6 2.7 3.2A5.2 5.2 0 0 1 12 22a5.2 5.2 0 0 1-5.2-5.9c.2-2.5 2.1-4.2 3.8-5.5C11.1 9.2 12 6.8 12 2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" opacity="0.9"/></svg>
          <strong><span id="skinViewPieces">0</span></strong>
        </div>
      </div>

      <div class="panel">
        <div class="skin-view-head">
          <h2 class="panel-title">Collection</h2>
          <div class="muted">잠긴 스킨은 ???로 표시</div>
        </div>
        <div id="skinGrid" class="skin-grid"></div>
        <div id="skinPagination" class="skin-pagination"></div>
      </div>
    </section>

    <section id="gachaView" class="view">
      <div class="hud">
        <div class="pill" title="퍼즐 조각">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 2c2.6 3 3.4 5.2 3.4 7 0 1.1-.3 2.1-.9 2.9 1.5.2 2.7 1.6 2.7 3.2A5.2 5.2 0 0 1 12 22a5.2 5.2 0 0 1-5.2-5.9c.2-2.5 2.1-4.2 3.8-5.5C11.1 9.2 12 6.8 12 2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" opacity="0.9"/></svg>
          <strong><span id="gachaPieces">0</span></strong>
        </div>
      </div>

      <div class="panel">
        <div class="skin-view-head">
          <h2 class="panel-title">Gacha</h2>
          <div class="muted">등급 확률: 레어 80% / 에픽 18% / 레전더리 2%</div>
        </div>

        <div class="muted" style="margin-top: 6px;">이번 뽑기 비용: <strong><span id="gachaCost">10</span></strong> 조각</div>
        <button class="btn alt" id="gachaPull" style="margin-top: 12px;">1회 뽑기</button>
        <div id="gachaResult" style="margin-top:12px;font-weight:950;"></div>
      </div>
    </section>

    <section id="settingsView" class="view">
      <div class="hud">
        <div class="pill" title="앱 정보">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z" stroke="currentColor" stroke-width="1.6"/><path d="M12 10.8v5.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M12 7.2h.01" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
          <strong>Settings</strong>
        </div>
      </div>

      <div class="panel">
        <h2 class="panel-title">테마</h2>
        <div class="muted" style="margin-top:8px; line-height: 1.35;">기기 설정(자동) 또는 다크/라이트를 선택할 수 있어요.</div>
        <div class="seg" role="group" aria-label="Theme">
          <button class="seg-btn" id="themeSystem" type="button">자동</button>
          <button class="seg-btn" id="themeDark" type="button">다크</button>
          <button class="seg-btn" id="themeLight" type="button">라이트</button>
        </div>
      </div>

      <div class="panel">
        <h2 class="panel-title">데이터</h2>
        <div class="muted" style="margin-top:8px; line-height: 1.35;">최고기록, 조각, 스킨 해금, 뽑기 횟수는 이 기기에 저장됩니다.</div>
        <button class="btn" id="resetProgressBtn" style="margin-top: 12px; border-color: rgba(255,81,96,0.35);">진행 초기화</button>
      </div>
    </section>

    <section id="gameView" class="view">
      <div class="game-hud">
        <div class="hud-chip"><span>Score</span><strong><span id="score">0</span></strong></div>
        <div class="hud-chip"><span>Best</span><strong><span id="best">0</span></strong></div>
        <div class="hud-chip"><span>Lv</span><strong><span id="difficulty">1</span></strong></div>
        <div class="hud-chip"><span>Pieces</span><strong><span id="pieces">0</span></strong></div>
      </div>

    <nav class="tabbar" aria-label="Navigation">
      <div class="tab-indicator" aria-hidden="true"></div>

        Gacha

        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7.2 4h9.6c1 0 1.8.8 1.8 1.8v12.4c0 1-.8 1.8-1.8 1.8H7.2c-1 0-1.8-.8-1.8-1.8V5.8C5.4 4.8 6.2 4 7.2 4Z" stroke="currentColor" stroke-width="1.6"/><path d="M9 8h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M9 12h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M9 16h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>

        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 15.4a3.4 3.4 0 1 0 0-6.8 3.4 3.4 0 0 0 0 6.8Z" stroke="currentColor" stroke-width="1.6"/><path d="M19.4 12a7.4 7.4 0 0 0-.08-1.06l2-1.55-2-3.46-2.45.98a7.5 7.5 0 0 0-1.82-1.06l-.38-2.6H9.33l-.38 2.6c-.64.25-1.25.6-1.82 1.06L4.68 5.93l-2 3.46 2 1.55c-.05.35-.08.7-.08 1.06s.03.71.08 1.06l-2 1.55 2 3.46 2.45-.98c.57.46 1.18.81 1.82 1.06l.38 2.6h5.34l.38-2.6c.64-.25 1.25-.6 1.82-1.06l2.45.98 2-3.46-2-1.55c.05-.35.08-.7.08-1.06Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" opacity="0.95"/></svg>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const lobbyViewEl = document.getElementById("lobbyView");
    const skinViewEl = document.getElementById("skinView");
    const gameViewEl = document.getElementById("gameView");
    const lobbyBestEl = document.getElementById("lobbyBest");
    const lobbyPiecesEl = document.getElementById("lobbyPieces");
    const lobbySkinNameEl = document.getElementById("lobbySkinName");
    const lobbyMascotEl = document.getElementById("lobbyMascot");
    const nextSkinHintEl = document.getElementById("nextSkinHint");
    const openSkinBtn = document.getElementById("openSkinBtn");
    const openGachaBtn = document.getElementById("openGachaBtn");
    const gachaViewEl = document.getElementById("gachaView");
    const gachaPiecesEl = document.getElementById("gachaPieces");
    const gachaCostEl = document.getElementById("gachaCost");
    const gachaPullBtn = document.getElementById("gachaPull");
    const gachaResultEl = document.getElementById("gachaResult");
    const backFromGachaBtn = document.getElementById("backFromGacha");
    const skinViewPiecesEl = document.getElementById("skinViewPieces");
    const skinGridEl = document.getElementById("skinGrid");
    const skinPaginationEl = document.getElementById("skinPagination");
    const backFromSkinBtn = document.getElementById("backFromSkin");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const difficultyEl = document.getElementById("difficulty");
    const piecesEl = document.getElementById("pieces");
    const noticeEl = document.getElementById("notice");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restart");
    const backLobbyBtn = document.getElementById("backLobby");

    const appEl = document.querySelector(".app");

    function setAppHeightStable() {
      // Lock app height to current viewport px to avoid mid-game jumps (address bar show/hide).
      const h = Math.max(520, Math.floor(window.innerHeight * 0.92));
      document.documentElement.style.setProperty('--appVhPx', h + 'px');
    }

    // Initialize early
    setAppHeightStable();

    window.addEventListener('resize', () => {
      // During gameplay we keep the height stable; update only in menus.
      const inGame = appEl && appEl.classList.contains('in-game');
      if (!inGame) setAppHeightStable();
      requestAnimationFrame(updateTabIndicator);
    });
    const lobbyLevelEl = document.getElementById("lobbyLevel");
    const settingsViewEl = document.getElementById("settingsView");
    const resetProgressBtn = document.getElementById("resetProgressBtn");

    const themeSystemBtn = document.getElementById("themeSystem");
    const themeDarkBtn = document.getElementById("themeDark");
    const themeLightBtn = document.getElementById("themeLight");

    const tabHomeBtn = document.getElementById("tabHome");
    const tabGachaBtn = document.getElementById("tabGacha");
    const tabCollectionBtn = document.getElementById("tabCollection");
    const tabSettingsBtn = document.getElementById("tabSettings");

    const tabbarEl = document.querySelector('.tabbar');
    const tabIndicatorEl = document.querySelector('.tab-indicator');

    function updateTabIndicator() {
      if (!tabbarEl || !tabIndicatorEl) return;
      const active = tabbarEl.querySelector('button.active');
      if (!active) return;
      const bar = tabbarEl.getBoundingClientRect();
      const a = active.getBoundingClientRect();
      const x = Math.round(a.left - bar.left);
      const w = Math.round(a.width);
      tabIndicatorEl.style.width = w + 'px';
      tabIndicatorEl.style.transform = 'translateX(' + x + 'px)';
    }

    const W = canvas.width;
    const H = canvas.height;

    const SKINS = [
      { id: "basic", name: "기본", body: "#A8E6CF", eye: "#142025", unlockPieces: 0, unlockLine: "기본은 언제나 든든한 스타터!" },
      { id: "sunset", name: "선셋", body: "#FFD166", eye: "#3E2A1E", unlockPieces: 10, unlockLine: "노을빛 입장, 오늘 판 분위기 좋다!" },
      { id: "mint", name: "민트", body: "#7CE7D4", eye: "#103A44", unlockPieces: 25, unlockLine: "상쾌한 민트 출격, 손이 더 가벼워진다!" },
      { id: "night", name: "나이트", body: "#94A3FF", eye: "#1F2240", unlockPieces: 45, unlockLine: "밤하늘 모드 해제, 이제 진짜 고수 느낌!" },
      { id: "cherry", name: "체리", body: "#FF8AAE", eye: "#4B1F2F", unlockPieces: 70, unlockLine: "체리 팡! 화면이 더 달콤해졌다!" },
      { id: "forest", name: "포레스트", body: "#7CCB5A", eye: "#1C3A24", unlockPieces: 100, unlockLine: "숲속 모드 온, 집중력이 살아난다!" },
      { id: "ocean", name: "오션", body: "#6CCBFF", eye: "#11394A", unlockPieces: 135, unlockLine: "파도 리듬 탑승, 회피 감각 최대치!" },
      { id: "volcano", name: "볼케이노", body: "#FF7B4A", eye: "#3D170D", unlockPieces: 175, unlockLine: "화산 코어 점화, 손끝이 뜨거워진다!" },
      { id: "aurora", name: "오로라", body: "#7AF0FF", eye: "#093340", unlockPieces: 999999, gachaOnly: true, rarity: "R", unlockLine: "오로라 스킨 등장, 화면이 반짝인다!" },
      { id: "gold", name: "골드", body: "#F6D365", eye: "#3A2A12", unlockPieces: 999999, gachaOnly: true, rarity: "L", unlockLine: "골드 스킨 획득! 오늘 운이 미쳤다." },
      { id: "glitch", name: "글리치", body: "#C77DFF", eye: "#1E1233", unlockPieces: 999999, gachaOnly: true, rarity: "E", unlockLine: "글리치 모드 ON, 픽셀이 춤춘다." }
    ];
    const SKINS_PER_PAGE = 4;

    let bestScore = Number(localStorage.getItem("avoid_best") || 0);
    let puzzlePieces = Number(localStorage.getItem("avoid_pieces") || 0);
    let unlockedSkins = JSON.parse(localStorage.getItem("avoid_unlocked_skins") || "[\"basic\"]");
    let selectedSkinId = localStorage.getItem("avoid_selected_skin") || "basic";
    let gachaPullCount = Number(localStorage.getItem("avoid_gacha_pulls") || 0);
    bestEl.textContent = String(bestScore);
    lobbyBestEl.textContent = String(bestScore);
    piecesEl.textContent = String(puzzlePieces);
    lobbyPiecesEl.textContent = String(puzzlePieces);

    let keys = { left: false, right: false, up: false, down: false };
    let obstacles = [];
    let puzzleDrops = [];
    let score = 0;
    let gameOver = false;
    let gameStarted = false;
    let frame = 0;
    let difficultyTier = 0;
    let noticeTimer = null;
    let skinPage = 1;

    const player = {
      x: W / 2 - 18,
      y: H - 62,
      w: 36,
      h: 36,
      speed: 5.2
    };

    function getSkinById(id) {
      return SKINS.find((skin) => skin.id === id) || SKINS[0];
    }

    function ensureSkinState() {
      const unlockedSet = new Set(unlockedSkins);
      for (const skin of SKINS) {
        if (!skin.gachaOnly && puzzlePieces >= skin.unlockPieces) unlockedSet.add(skin.id);
      }
      unlockedSkins = SKINS.map((skin) => skin.id).filter((id) => unlockedSet.has(id));
      if (!unlockedSkins.includes(selectedSkinId)) selectedSkinId = unlockedSkins[0] || "basic";
      localStorage.setItem("avoid_unlocked_skins", JSON.stringify(unlockedSkins));
      localStorage.setItem("avoid_selected_skin", selectedSkinId);
    }

    function updateSkinLobbyUI() {
      const currentSkin = getSkinById(selectedSkinId);
      if (lobbyMascotEl) {
        lobbyMascotEl.style.setProperty("--skin-body", currentSkin.body);
        lobbyMascotEl.style.setProperty("--skin-eye", currentSkin.eye);
        lobbyMascotEl.classList.toggle("legendary", currentSkin.rarity === "L");
      }
      lobbySkinNameEl.textContent = currentSkin.name;
      lobbyPiecesEl.textContent = String(puzzlePieces);
      piecesEl.textContent = String(puzzlePieces);
      skinViewPiecesEl.textContent = String(puzzlePieces);
      if (gachaPiecesEl) gachaPiecesEl.textContent = String(puzzlePieces);

      const lockedSkin = SKINS.find((skin) => !skin.gachaOnly && !unlockedSkins.includes(skin.id));
      if (!lockedSkin) {
        nextSkinHintEl.textContent = "모든 스킨을 해금했어요.";
      } else {
        const remain = Math.max(0, lockedSkin.unlockPieces - puzzlePieces);
        nextSkinHintEl.textContent = `다음 스킨: ??? | 문구: ??? | 해금까지 ${remain}개`;
      }
    }
    function setActiveTab(viewId) {
      const tabs = [tabHomeBtn, tabGachaBtn, tabCollectionBtn, tabSettingsBtn].filter(Boolean);
      for (const t of tabs) {
        t.classList.remove("active");
        t.removeAttribute("aria-current");
      }

      const map = {
        lobbyView: tabHomeBtn,
        gachaView: tabGachaBtn,
        skinView: tabCollectionBtn,
        settingsView: tabSettingsBtn
      };
      const active = map[viewId];
      if (active) {
        active.classList.add("active");
        active.setAttribute("aria-current", "page");
      }


      requestAnimationFrame(updateTabIndicator);
    }
    const themeMetaEl = document.querySelector('meta[name="theme-color"]');
    const THEME_KEY = 'avoid_theme_mode'; // 'system' | 'dark' | 'light'

    function getSystemTheme() {
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    function setThemeButtons(mode) {
      const btns = [themeSystemBtn, themeDarkBtn, themeLightBtn].filter(Boolean);
      for (const b of btns) b.classList.remove('active');
      if (mode === 'system' && themeSystemBtn) themeSystemBtn.classList.add('active');
      if (mode === 'dark' && themeDarkBtn) themeDarkBtn.classList.add('active');
      if (mode === 'light' && themeLightBtn) themeLightBtn.classList.add('active');
    }

    function applyThemeMode(mode) {
      const root = document.documentElement;
      const resolved = mode === 'system' ? getSystemTheme() : mode;
      if (mode === 'system') {
        root.removeAttribute('data-theme');
      } else {
        root.setAttribute('data-theme', mode);
      }
      // theme-color for browser UI
      if (themeMetaEl) themeMetaEl.setAttribute('content', resolved === 'light' ? '#eef2ff' : '#0f1220');
      setThemeButtons(mode);
    }

    function loadThemeMode() {
      const saved = localStorage.getItem(THEME_KEY) || 'system';
      applyThemeMode(saved);
      return saved;
    }

    function saveThemeMode(mode) {
      localStorage.setItem(THEME_KEY, mode);
      applyThemeMode(mode);
    }

    if (window.matchMedia) {
      const mq = window.matchMedia('(prefers-color-scheme: light)');
      // When in system mode, react to system changes
      mq.addEventListener && mq.addEventListener('change', () => {
        const saved = localStorage.getItem(THEME_KEY) || 'system';
        if (saved === 'system') applyThemeMode('system');
      });
    }


    function openSettingsView() {
      updateSkinLobbyUI();
      setActiveView(settingsViewEl);
    }

    function resetProgress() {
      const ok = confirm("정말 초기화할까요?\n\n최고기록, 조각, 스킨, 뽑기 기록이 모두 삭제됩니다.");
      if (!ok) return;
      const keys = [
        "avoid_best",
        "avoid_pieces",
        "avoid_unlocked_skins",
        "avoid_selected_skin",
        "avoid_gacha_pulls"
      ];
      for (const k of keys) localStorage.removeItem(k);
      location.reload();
    }

    function setActiveView(viewEl) {
      const views = [lobbyViewEl, skinViewEl, gachaViewEl, settingsViewEl, gameViewEl];
      for (const v of views) {
        if (v && v.classList) v.classList.remove("active");
      }
      if (viewEl && viewEl.classList) viewEl.classList.add("active");

      if (appEl) appEl.classList.toggle("in-game", viewEl === gameViewEl);
      document.documentElement.classList.toggle("in-game", viewEl === gameViewEl);
      if (viewEl !== gameViewEl) setAppHeightStable();
      setActiveTab(viewEl && viewEl.id ? viewEl.id : "");
      requestAnimationFrame(updateTabIndicator);
    }

    function selectSkin(skinId) {
      if (!unlockedSkins.includes(skinId)) return;
      selectedSkinId = skinId;
      localStorage.setItem("avoid_selected_skin", selectedSkinId);
      updateSkinLobbyUI();
      renderSkinGrid();
    }

    function getSkinPageCount() {
      return Math.max(1, Math.ceil(SKINS.length / SKINS_PER_PAGE));
    }

    function renderSkinPagination() {
      const totalPages = getSkinPageCount();
      skinPaginationEl.innerHTML = "";
      for (let p = 1; p <= totalPages; p++) {
        const btn = document.createElement("button");
        btn.className = "page-btn" + (p === skinPage ? " active" : "");
        btn.textContent = String(p);
        btn.addEventListener("click", () => {
          skinPage = p;
          renderSkinGrid();
        });
        skinPaginationEl.appendChild(btn);
      }
    }

    function renderSkinGrid() {
      skinGridEl.innerHTML = "";
      const totalPages = getSkinPageCount();
      skinPage = Math.max(1, Math.min(skinPage, totalPages));
      const start = (skinPage - 1) * SKINS_PER_PAGE;
      const pageSkins = SKINS.slice(start, start + SKINS_PER_PAGE);

      for (const skin of pageSkins) {
        const unlocked = unlockedSkins.includes(skin.id);
        const card = document.createElement("article");
        const isLegendary = unlocked && skin.rarity === "L";
        card.className = "skin-card" + (selectedSkinId === skin.id ? " selected" : "") + (isLegendary ? " legendary" : "");

        const displayName = unlocked ? skin.name : "???";
        const displayLine = unlocked ? skin.unlockLine : "???";
        const chipColor = unlocked ? skin.body : "#c4c9cd";
        card.innerHTML = `
          <div><span class="skin-chip" style="background:${chipColor};"></span><strong>${displayName}</strong>${isLegendary ? `<span class="rarity-tag rarity-L">레전더리</span>` : ""}</div>
          <div>${displayLine}</div>
          <button class="mini-btn"${unlocked ? "" : " disabled"}>${selectedSkinId === skin.id ? "선택됨" : (unlocked ? "선택" : "잠김")}</button>
        `;

        const btn = card.querySelector("button");
        if (btn && unlocked) {
          btn.addEventListener("click", () => selectSkin(skin.id));
        }
        skinGridEl.appendChild(card);
      }
      renderSkinPagination();
    }
    const RARITIES = {
      R: { name: "레어", weight: 80, dupRefund: 6 },
      E: { name: "에픽", weight: 18, dupRefund: 12 },
      L: { name: "레전더리", weight: 2, dupRefund: 25 }
    };

    function pickRarity() {
      const entries = Object.entries(RARITIES);
      const total = entries.reduce((sum, [, v]) => sum + v.weight, 0);
      let r = Math.random() * total;
      for (const [key, v] of entries) {
        r -= v.weight;
        if (r <= 0) return key;
      }
      return entries[entries.length - 1][0];
    }

    function getRarityName(skin) {
      const key = skin && skin.rarity ? skin.rarity : "R";
      return (RARITIES[key] && RARITIES[key].name) || "레어";
    }

    function getDuplicateRefund(skin) {
      const key = skin && skin.rarity ? skin.rarity : "R";
      return (RARITIES[key] && RARITIES[key].dupRefund) || 3;
    }

    function pickGachaId() {
      const rarity = pickRarity();
      const pool = SKINS.filter((s) => s.gachaOnly && s.rarity === rarity);
      const fallback = SKINS.filter((s) => s.gachaOnly);
      const list = pool.length ? pool : fallback;
      if (!list.length) return "basic";
      return list[Math.floor(Math.random() * list.length)].id;
    }

    function getGachaCost() {
      // 10, 20, 30... (pull count starts at 0)
      return 10 * (gachaPullCount + 1);
    }

    function syncGachaUI() {
      const cost = getGachaCost();
      if (gachaPiecesEl) gachaPiecesEl.textContent = String(puzzlePieces);
      if (gachaCostEl) gachaCostEl.textContent = String(cost);
      if (gachaPullBtn) gachaPullBtn.disabled = puzzlePieces < cost;
    }

    function openGachaView() {
      updateSkinLobbyUI();
      syncGachaUI();
      if (gachaResultEl) gachaResultEl.textContent = "";
      setActiveView(gachaViewEl);
    }

    function pullGachaOnce() {
      const cost = getGachaCost();
      if (puzzlePieces < cost) {
        if (gachaResultEl) gachaResultEl.textContent = "조각이 부족해요.";
        showDifficultyNotice("조각이 부족해요.");
        syncGachaUI();
        return;
      }

      puzzlePieces -= cost;
      gachaPullCount += 1;
      localStorage.setItem("avoid_gacha_pulls", String(gachaPullCount));
      localStorage.setItem("avoid_pieces", String(puzzlePieces));

      const id = pickGachaId();
      const skin = getSkinById(id);

      if (!unlockedSkins.includes(id)) {
        unlockedSkins.push(id);
        localStorage.setItem("avoid_unlocked_skins", JSON.stringify(unlockedSkins));
        updateSkinLobbyUI();
        renderSkinGrid();
        if (gachaResultEl) {
          gachaResultEl.textContent = `획득! (${getRarityName(skin)}) ${skin.name}`;
          gachaResultEl.classList.remove("legendary-pop");
          if (skin.rarity === "L") {
            void gachaResultEl.offsetWidth;
            gachaResultEl.classList.add("legendary-pop");
          }
        }
        showDifficultyNotice(skin.unlockLine);
      } else {
        const refund = getDuplicateRefund(skin);
        puzzlePieces += refund;
        localStorage.setItem("avoid_pieces", String(puzzlePieces));
        updateSkinLobbyUI();
        if (gachaResultEl) {
          gachaResultEl.textContent = `중복! (${getRarityName(skin)}) 조각 +${refund}`;
          gachaResultEl.classList.remove("legendary-pop");
          if (skin.rarity === "L") {
            void gachaResultEl.offsetWidth;
            gachaResultEl.classList.add("legendary-pop");
          }
        }
        showDifficultyNotice(`중복! (${getRarityName(skin)}) 조각 +${refund}`);
      }

      syncGachaUI();
      if (skinViewEl.classList.contains("active")) renderSkinGrid();
    }


    function openSkinView() {
      updateSkinLobbyUI();
      const selectedIndex = SKINS.findIndex((skin) => skin.id === selectedSkinId);
      if (selectedIndex >= 0) {
        skinPage = Math.floor(selectedIndex / SKINS_PER_PAGE) + 1;
      }
      renderSkinGrid();
      setActiveView(skinViewEl);
    }

    function addPuzzlePiece(count = 1) {
      const prevUnlocked = new Set(unlockedSkins);
      puzzlePieces += count;
      localStorage.setItem("avoid_pieces", String(puzzlePieces));
      ensureSkinState();
      updateSkinLobbyUI();
      if (skinViewEl.classList.contains("active")) renderSkinGrid();
      const newlyUnlocked = SKINS.find((skin) => !prevUnlocked.has(skin.id) && unlockedSkins.includes(skin.id));
      if (newlyUnlocked) {
        showDifficultyNotice(newlyUnlocked.unlockLine);
      }
    }

    function resetGame() {
      obstacles = [];
      puzzleDrops = [];
      score = 0;
      gameOver = false;
      frame = 0;
      difficultyTier = 0;
      keys.left = false;
      keys.right = false;
      keys.up = false;
      keys.down = false;
      player.x = W / 2 - player.w / 2;
      player.y = H - 62;
      scoreEl.textContent = "0";
      difficultyEl.textContent = "1";
      piecesEl.textContent = String(puzzlePieces);
      hideDifficultyNotice();
    }

    function showLobbyView() {
      lobbyBestEl.textContent = String(bestScore);
      if (lobbyLevelEl) lobbyLevelEl.textContent = String(Math.floor(bestScore / 20) + 1);
      updateSkinLobbyUI();
      setActiveView(lobbyViewEl);
      gameStarted = false;
      hideDifficultyNotice();
      keys.left = false;
      keys.right = false;
      keys.up = false;
      keys.down = false;
    }

    function startGame() {
      resetGame();
      setActiveView(gameViewEl);
      gameStarted = true;
    }

    function getSpeedTier() {
      return Math.floor(score / 20);
    }

    function showDifficultyNotice(text) {
      noticeEl.textContent = text;
      noticeEl.classList.add("show");
      if (noticeTimer) clearTimeout(noticeTimer);
      noticeTimer = setTimeout(() => {
        noticeEl.classList.remove("show");
      }, 1100);
    }

    function hideDifficultyNotice() {
      noticeEl.textContent = "";
      noticeEl.classList.remove("show");
      if (noticeTimer) {
        clearTimeout(noticeTimer);
        noticeTimer = null;
      }
    }

    function syncDifficulty() {
      const nextTier = getSpeedTier();
      if (nextTier === difficultyTier) return;
      const prevTier = difficultyTier;
      difficultyTier = nextTier;
      difficultyEl.textContent = String(difficultyTier + 1);
      if (difficultyTier > prevTier) {
        showDifficultyNotice(`난이도 상승! Lv.${difficultyTier + 1}`);
      }
    }

    function spawnTopObstacle() {
      const min = 22;
      const max = 60;
      const size = Math.random() * (max - min) + min;
      const tier = getSpeedTier();
      const speed = Math.random() * 2.3 + 2.5 + tier * 0.25;
      obstacles.push({
        x: Math.random() * (W - size),
        y: -size - 6,
        w: size,
        h: size,
        vx: 0,
        vy: speed
      });
    }

    function spawnSideObstacle() {
      const min = 20;
      const max = 52;
      const size = Math.random() * (max - min) + min;
      const tier = getSpeedTier();
      const speed = Math.random() * 1.8 + 2.2 + tier * 0.18;
      const fromLeft = Math.random() < 0.5;
      obstacles.push({
        x: fromLeft ? -size - 8 : W + 8,
        y: Math.random() * (H - size),
        w: size,
        h: size,
        vx: fromLeft ? speed : -speed,
        vy: 0
      });
    }

    function spawnDiagonalObstacle() {
      const min = 20;
      const max = 54;
      const size = Math.random() * (max - min) + min;
      const tier = getSpeedTier();
      const speed = Math.random() * 1.6 + 2.0 + tier * 0.18;

      const fromLeft = Math.random() < 0.5;
      const fromTop = Math.random() < 0.5;

      obstacles.push({
        x: fromLeft ? -size - 8 : W + 8,
        y: fromTop ? -size - 8 : H + 8,
        w: size,
        h: size,
        vx: fromLeft ? speed : -speed,
        vy: fromTop ? speed : -speed
      });
    }

    function spawnObstacle() {
      if (score >= 200 && Math.random() < 0.28) {
        spawnDiagonalObstacle();
        return;
      }
      if (score >= 100 && Math.random() < 0.35) {
        spawnSideObstacle();
        return;
      }
      spawnTopObstacle();
    }

    function spawnPuzzleDrop() {
      const size = 16;
      const tier = getSpeedTier();
      const speed = 2.2 + tier * 0.14;
      puzzleDrops.push({
        x: Math.random() * (W - size),
        y: -size - 8,
        w: size,
        h: size,
        vy: speed
      });
    }

    function isOffScreen(o) {
      const margin = 24;
      return (
        o.x > W + margin ||
        o.x + o.w < -margin ||
        o.y > H + margin ||
        o.y + o.h < -margin
      );
    }

    function rectHit(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function update() {
      if (gameOver || !gameStarted) return;
      frame++;

      if (keys.left) player.x -= player.speed;
      if (keys.right) player.x += player.speed;
      if (keys.up) player.y -= player.speed;
      if (keys.down) player.y += player.speed;
      player.x = Math.max(0, Math.min(W - player.w, player.x));
      player.y = Math.max(0, Math.min(H - player.h, player.y));

      const spawnTerm = Math.max(18, 45 - Math.floor(score / 70));
      if (frame % spawnTerm === 0) spawnObstacle();
      if (frame % 95 === 0 && Math.random() < 0.42) spawnPuzzleDrop();

      const speedFactor = 1 + getSpeedTier() * 0.06;
      for (let i = obstacles.length - 1; i >= 0; i--) {
        const o = obstacles[i];
        o.x += o.vx * speedFactor;
        o.y += o.vy * speedFactor;

        if (rectHit(player, o)) {
          gameOver = true;
          if (score > bestScore) {
            bestScore = score;
            localStorage.setItem("avoid_best", String(bestScore));
            bestEl.textContent = String(bestScore);
            lobbyBestEl.textContent = String(bestScore);
          }
          break;
        }

        if (isOffScreen(o)) {
          obstacles.splice(i, 1);
          score++;
          scoreEl.textContent = String(score);
        }
      }

      for (let i = puzzleDrops.length - 1; i >= 0; i--) {
        const p = puzzleDrops[i];
        p.y += p.vy;

        if (rectHit(player, p)) {
          puzzleDrops.splice(i, 1);
          addPuzzlePiece(1);
          continue;
        }

        if (isOffScreen(p)) {
          puzzleDrops.splice(i, 1);
        }
      }

      syncDifficulty();
    }

    function drawBackground() {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, "#11202A");
      grad.addColorStop(1, "#365264");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Horizontal scan lines (keeps the background stable when the player/obstacles move).
      ctx.fillStyle = "rgba(255,255,255,0.09)";
      for (let i = 0; i < 7; i++) {
        const y = (frame * 2 + i * 90) % (H + 90) - 90;
        const yy = Math.floor(y);
        ctx.fillRect(0, yy, W, 2);
      }
    }

    function drawPlayer() {
      const skin = getSkinById(selectedSkinId);

      if (skin.rarity === "L") {
        const cx = player.x + player.w / 2;
        const cy = player.y + player.h / 2;
        const pulse = 0.5 + 0.5 * Math.sin(frame * 0.12);

        // legendary aura
        ctx.save();
        ctx.globalAlpha = 0.22 + 0.14 * pulse;
        ctx.shadowColor = "rgba(255, 215, 0, 0.95)";
        ctx.shadowBlur = 18 + 10 * pulse;
        ctx.fillStyle = "rgba(246, 211, 101, 0.55)";
        ctx.fillRect(player.x - 3, player.y - 3, player.w + 6, player.h + 6);
        ctx.restore();

        // sparkles
        ctx.save();
        for (let i = 0; i < 8; i++) {
          const a = frame * 0.08 + i * (Math.PI * 2 / 8);
          const r = 26 + 6 * Math.sin(frame * 0.10 + i);
          const x = cx + Math.cos(a) * r;
          const y = cy + Math.sin(a) * r;
          ctx.globalAlpha = 0.35 + 0.25 * pulse;
          ctx.fillStyle = i % 2 === 0 ? "#fff6c7" : "#ffe08a";
          ctx.fillRect(x, y, 2, 2);
        }
        ctx.restore();
      }

      ctx.fillStyle = skin.body;
      ctx.fillRect(player.x, player.y, player.w, player.h);
      ctx.fillStyle = skin.eye;
      ctx.fillRect(player.x + 8, player.y + 8, 7, 7);
      ctx.fillRect(player.x + 21, player.y + 8, 7, 7);
    }

    function drawObstacles() {
      for (const o of obstacles) {
        ctx.fillStyle = "#EF6F6C";
        ctx.fillRect(o.x, o.y, o.w, o.h);
      }
    }

    function drawPuzzleDrops() {
      for (const p of puzzleDrops) {
        ctx.fillStyle = "#FFD166";
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = "#fff3c4";
        ctx.fillRect(p.x + 4, p.y + 4, 3, 3);
        ctx.fillRect(p.x + 9, p.y + 4, 3, 3);
        ctx.fillRect(p.x + 6, p.y + 9, 4, 4);
      }
    }

    function drawGameOver() {
      if (!gameOver) return;
      ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.font = "bold 40px Trebuchet MS";
      ctx.fillText("GAME OVER", W / 2, H / 2 - 26);
      ctx.font = "20px Trebuchet MS";
      ctx.fillText(`점수: ${score}`, W / 2, H / 2 + 8);
      ctx.font = "16px Trebuchet MS";
      ctx.fillText("R 키 또는 버튼으로 재시작", W / 2, H / 2 + 40);
    }

    function loop() {
      update();
      drawBackground();
      drawPlayer();
      drawObstacles();
      drawPuzzleDrops();
      drawGameOver();
      requestAnimationFrame(loop);
    }

    function isLeftKey(e) {
      return e.code === "ArrowLeft" || e.code === "KeyA" || e.key === "ArrowLeft";
    }

    function isRightKey(e) {
      return e.code === "ArrowRight" || e.code === "KeyD" || e.key === "ArrowRight";
    }

    function isUpKey(e) {
      return e.code === "ArrowUp" || e.code === "KeyW" || e.key === "ArrowUp";
    }

    function isDownKey(e) {
      return e.code === "ArrowDown" || e.code === "KeyS" || e.key === "ArrowDown";
    }

    function isRestartKey(e) {
      return e.code === "KeyR" || e.key === "r" || e.key === "R";
    }

    window.addEventListener("keydown", (e) => {
      let handled = false;
      if (isLeftKey(e)) {
        keys.left = true;
        handled = true;
      }
      if (isRightKey(e)) {
        keys.right = true;
        handled = true;
      }
      if (isUpKey(e)) {
        keys.up = true;
        handled = true;
      }
      if (isDownKey(e)) {
        keys.down = true;
        handled = true;
      }
      if (isRestartKey(e)) {
        if (gameViewEl.classList.contains("active")) resetGame();
        if (lobbyViewEl.classList.contains("active")) startGame();
        handled = true;
      }
      if (handled) e.preventDefault();
    });

    window.addEventListener("keyup", (e) => {
      let handled = false;
      if (isLeftKey(e)) {
        keys.left = false;
        handled = true;
      }
      if (isRightKey(e)) {
        keys.right = false;
        handled = true;
      }
      if (isUpKey(e)) {
        keys.up = false;
        handled = true;
      }
      if (isDownKey(e)) {
        keys.down = false;
        handled = true;
      }
      if (handled) e.preventDefault();
    });

    canvas.addEventListener("touchstart", (e) => {
      const touch = e.touches[0];
      if (!touch) return;
      const rect = canvas.getBoundingClientRect();
      const x = touch.clientX - rect.left;
      keys.left = x < rect.width / 2;
      keys.right = x >= rect.width / 2;
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
      const touch = e.touches[0];
      if (!touch) return;
      const rect = canvas.getBoundingClientRect();
      const x = touch.clientX - rect.left;
      keys.left = x < rect.width / 2;
      keys.right = x >= rect.width / 2;
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchend", () => {
      keys.left = false;
      keys.right = false;
      keys.up = false;
      keys.down = false;
    });
    if (restartBtn) {
      restartBtn.addEventListener("click", () => {
        resetGame();
      });
    }
    if (backLobbyBtn) backLobbyBtn.addEventListener("click", showLobbyView);
    if (backFromSkinBtn) backFromSkinBtn.addEventListener("click", showLobbyView);
    if (startBtn) startBtn.addEventListener("click", startGame);
    if (openSkinBtn) openSkinBtn.addEventListener("click", openSkinView);
    if (openGachaBtn) openGachaBtn.addEventListener("click", openGachaView);
    if (backFromGachaBtn) backFromGachaBtn.addEventListener("click", showLobbyView);
    if (gachaPullBtn) gachaPullBtn.addEventListener("click", pullGachaOnce);


    if (tabHomeBtn) tabHomeBtn.addEventListener("click", showLobbyView);
    if (tabGachaBtn) tabGachaBtn.addEventListener("click", openGachaView);
    if (tabCollectionBtn) tabCollectionBtn.addEventListener("click", openSkinView);
    if (tabSettingsBtn) tabSettingsBtn.addEventListener("click", openSettingsView);
    if (resetProgressBtn) resetProgressBtn.addEventListener("click", resetProgress);

    if (themeSystemBtn) themeSystemBtn.addEventListener('click', () => saveThemeMode('system'));
    if (themeDarkBtn) themeDarkBtn.addEventListener('click', () => saveThemeMode('dark'));
    if (themeLightBtn) themeLightBtn.addEventListener('click', () => saveThemeMode('light'));

    loadThemeMode();
    requestAnimationFrame(updateTabIndicator);
    ensureSkinState();
    updateSkinLobbyUI();
    renderSkinGrid();
    resetGame();
    showLobbyView();
    loop();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js", { updateViaCache: "none" })
          .then((reg) => reg.update())
          .catch((err) => {
            console.error("Service worker registration failed:", err);
          });
      });
    }
  </script>
</body>
</html>
